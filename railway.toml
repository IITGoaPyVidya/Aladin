# Railway deployment configuration
# https://docs.railway.app/reference/config-as-code
#
# Two services are defined:
#   - backend  → FastAPI served by Uvicorn
#   - frontend → React/Vite built and served by nginx
#
# Set environment variables in the Railway dashboard (or via railway vars set).

[build]
# Root-level builder hint — Railway will auto-detect each service's Dockerfile
builder = "DOCKERFILE"

# ── Backend service ──────────────────────────────────────────────────────────
[[services]]
name = "backend"
source = "backend"

[services.build]
dockerfilePath = "backend/Dockerfile"

[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 10

# ── Frontend service ─────────────────────────────────────────────────────────
[[services]]
name = "frontend"
source = "frontend"

[services.build]
dockerfilePath = "frontend/Dockerfile"

[services.deploy]
healthcheckPath = "/"
healthcheckTimeout = 10
